AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Globals:
  Function:
    Runtime: provided.al2023
    Architectures:
      - x86_64
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        JWT_SECRET: autocare_secret_key
        REDIS_ADDR: host.docker.internal:6379
        REDIS_PASSWORD: ""
        REDIS_DB: "0"

Resources:

  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: auth-service/
      Handler: bootstrap
      Environment:
        Variables:
          DATABASE_URL: postgres://postgres:postgres@host.docker.internal:5432/authdb?sslmode=disable
          ACCESS_TOKEN_MINUTES: "15"
          REFRESH_TOKEN_DAYS: "30"
      Events:
        AuthRootApi:
          Type: Api
          Properties:
            Path: /auth
            Method: ANY
        AuthProxyApi:
          Type: Api
          Properties:
            Path: /auth/{proxy+}
            Method: ANY

  BookingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: booking-service/
      Handler: bootstrap
      Environment:
        Variables:
          DATABASE_URL: postgres://postgres:postgres@host.docker.internal:5432/bookingdb?sslmode=disable
          BOOKING_EVENT_QUEUE: booking-events
      Events:
        BookingRootApi:
          Type: Api
          Properties:
            Path: /bookings
            Method: ANY
        BookingProxyApi:
          Type: Api
          Properties:
            Path: /bookings/{proxy+}
            Method: ANY

  CatalogFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: service-catalog/
      Handler: bootstrap
      Environment:
        Variables:
          DATABASE_URL: postgres://postgres:postgres@host.docker.internal:5432/catalogdb?sslmode=disable
      Events:
        CatalogRootApi:
          Type: Api
          Properties:
            Path: /catalog
            Method: ANY
        CatalogProxyApi:
          Type: Api
          Properties:
            Path: /catalog/{proxy+}
            Method: ANY

  UserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: user-service/
      Handler: bootstrap
      Environment:
        Variables:
          DATABASE_URL: postgres://postgres:postgres@host.docker.internal:5432/userdb?sslmode=disable
      Events:
        UserRootApi:
          Type: Api
          Properties:
            Path: /users
            Method: ANY
        UserProxyApi:
          Type: Api
          Properties:
            Path: /users/{proxy+}
            Method: ANY

  EmployeeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: employee-service/
      Handler: bootstrap
      Environment:
        Variables:
          DATABASE_URL: postgres://postgres:postgres@host.docker.internal:5432/employeedb?sslmode=disable
      Events:
        EmployeeRootApi:
          Type: Api
          Properties:
            Path: /employee
            Method: ANY
        EmployeeProxyApi:
          Type: Api
          Properties:
            Path: /employee/{proxy+}
            Method: ANY

  AnalyticsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: analytics-service/
      Handler: bootstrap
      Environment:
        Variables:
          CLICKHOUSE_ADDR: host.docker.internal:9000
          CLICKHOUSE_DB: autocare_analytics
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: clickhouse123
          BOOKING_EVENT_QUEUE: booking-events
      Events:
        AnalyticsRootApi:
          Type: Api
          Properties:
            Path: /analytics
            Method: ANY
        AnalyticsProxyApi:
          Type: Api
          Properties:
            Path: /analytics/{proxy+}
            Method: ANY
  PaymentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: payment-service/
      Handler: src/handler.handler
      Runtime: nodejs22.x
      Timeout: 60
      Environment:
        Variables:
          DATABASE_URL: postgres://postgres:postgres@host.docker.internal:5432/paymentdb?sslmode=disable
          JWT_SECRET: autocare_secret_key
          GST_PERCENT: "18"
          RAZORPAY_KEY_ID: rzp_test_SqpLuBwYLpl1XP
          RAZORPAY_KEY_SECRET: jQzg19YR10SnYZ4vLAgekThb
          STRIPE_SECRET_KEY: ""
          STRIPE_WEBHOOK_SECRET: ""
          PHONEPE_MERCHANT_ID: ""
          PHONEPE_SALT_KEY: ""
          PHONEPE_SALT_INDEX: "1"
      Events:
        PaymentRootApi:
          Type: Api
          Properties:
            Path: /payments
            Method: ANY
        PaymentProxyApi:
          Type: Api
          Properties:
            Path: /payments/{proxy+}
            Method: ANY
  NotificationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: notification-service/
      Handler: src/handler.handler
      Runtime: nodejs22.x
      Timeout: 60
      MemorySize: 512
      Environment:
        Variables:
          DATABASE_URL: postgres://postgres:postgres@host.docker.internal:5432/notificationdb?sslmode=disable
          JWT_SECRET: autocare_secret_key
          REDIS_ADDR: host.docker.internal
          REDIS_PORT: "6379"
          BOOKING_EVENT_QUEUE: booking-events
          NOTIFICATION_EVENT_QUEUE: notification-events
          TWILIO_ACCOUNT_SID: AC9911750eb3e63d2f61c94293ad848f1b
          TWILIO_AUTH_TOKEN: 836608c4620cf4c2cc2c285523d6a934
          TWILIO_FROM_NUMBER: "+14155238886"
          MSG91_AUTH_KEY: ""
          MSG91_SENDER_ID: ""
          RESEND_API_KEY: ""
          EMAIL_FROM: no-reply@autocare.local
      Events:
        NotificationRootApi:
          Type: Api
          Properties:
            Path: /notifications
            Method: ANY
        NotificationProxyApi:
          Type: Api
          Properties:
            Path: /notifications/{proxy+}
            Method: ANY