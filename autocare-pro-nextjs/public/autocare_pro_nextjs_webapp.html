
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#0F1F3D;--brand2:#1A3460;--accent:#F5A623;--accent2:#E8922B;
  --teal:#0EA5A0;--teal2:#0C8C88;
  --danger:#E53E3E;--success:#38A169;
  --bg:#F4F3EF;--bg2:#ECEAE4;--surface:#FFFFFF;--surface2:#F9F8F5;
  --txt:#1A1A1A;--txt2:#5A5A5A;--txt3:#9A9A9A;
  --border:#E2E0D8;--border2:#D0CEC4;
  --radius:10px;--radius-lg:16px;--radius-xl:24px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.06);
  --shadow-lg:0 4px 16px rgba(0,0,0,.1),0 12px 40px rgba(0,0,0,.08);
  --font:'DM Sans',sans-serif;--mono:'Space Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--txt);font-size:14px;overflow-x:hidden;min-height:100vh}

/* ── TOPBAR ── */
.topbar{height:52px;background:var(--brand);display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:200;box-shadow:0 1px 0 rgba(255,255,255,.07)}
.topbar-logo{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.logo-mark{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-mark i{font-size:16px;color:var(--brand)}
.logo-wordmark{font-family:var(--mono);font-size:13px;font-weight:700;color:#fff;letter-spacing:-.5px}
.logo-sub{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:.06em;margin-left:1px;display:block;line-height:1}
.topbar-nav{display:flex;gap:2px;margin-left:20px;flex:1;overflow-x:auto}
.topbar-nav::-webkit-scrollbar{display:none}
.tnav{padding:5px 11px;border-radius:7px;font-size:12px;font-weight:500;color:rgba(255,255,255,.55);cursor:pointer;white-space:nowrap;transition:all .15s;border:none;background:transparent}
.tnav:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.08)}
.tnav.active{color:#fff;background:rgba(255,255,255,.14)}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.portal-pill{display:flex;border:0.5px solid rgba(255,255,255,.2);border-radius:20px;overflow:hidden}
.pp{padding:4px 10px;font-size:11px;color:rgba(255,255,255,.5);cursor:pointer;transition:all .15s}
.pp.active{background:var(--accent);color:var(--brand);font-weight:600}
.tb-avatar{width:28px;height:28px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;cursor:pointer}

/* ── LAYOUT ── */
.shell{display:flex;min-height:calc(100vh - 52px)}
.sidebar{width:212px;background:var(--surface);border-right:0.5px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.sidebar::-webkit-scrollbar{width:3px}.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.sidebar-inner{padding:14px 8px;flex:1}
.s-section{margin-bottom:18px}
.s-label{font-size:10px;color:var(--txt3);letter-spacing:.08em;font-weight:600;padding:0 8px 6px;display:block}
.s-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;font-size:12.5px;font-weight:500;color:var(--txt2);cursor:pointer;transition:all .12s;border:none;background:none;width:100%;text-align:left}
.s-item:hover{background:var(--bg);color:var(--txt)}
.s-item.active{background:var(--brand);color:#fff}
.s-item i{font-size:16px;flex-shrink:0}
.s-badge{margin-left:auto;background:var(--accent);color:var(--brand);font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;font-family:var(--mono)}
.s-item.active .s-badge{background:#fff;color:var(--brand)}
.sidebar-footer{padding:12px 8px;border-top:0.5px solid var(--border)}
.biz-card{background:var(--bg);border-radius:10px;padding:10px;font-size:11px}
.biz-name{font-weight:600;color:var(--txt);margin-bottom:2px}
.biz-plan{color:var(--teal);font-weight:500}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;min-width:0}
.main::-webkit-scrollbar{width:4px}.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.page{padding:20px;display:none;animation:fadeIn .2s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── PAGE HEADER ── */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.ph-left{}
.ph-title{font-size:20px;font-weight:600;color:var(--txt);letter-spacing:-.4px;font-family:var(--mono)}
.ph-sub{font-size:12px;color:var(--txt2);margin-top:3px}
.ph-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:12.5px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:var(--font)}
.btn-primary{background:var(--brand);color:#fff}.btn-primary:hover{background:var(--brand2)}
.btn-accent{background:var(--accent);color:var(--brand);font-weight:600}.btn-accent:hover{background:var(--accent2)}
.btn-ghost{background:var(--surface);color:var(--txt2);border:0.5px solid var(--border)}.btn-ghost:hover{background:var(--bg);color:var(--txt)}
.btn-teal{background:var(--teal);color:#fff}.btn-teal:hover{background:var(--teal2)}
.btn-danger{background:#FEE2E2;color:var(--danger);border:0.5px solid #FECACA}.btn-danger:hover{background:#FECACA}
.btn i{font-size:15px}

/* ── STAT CARDS ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;right:0;width:60px;height:60px;border-radius:0 0 0 60px;opacity:.06}
.stat-card.s-blue::before{background:#2563EB}
.stat-card.s-amber::before{background:#F59E0B}
.stat-card.s-teal::before{background:#0EA5A0}
.stat-card.s-red::before{background:#E53E3E}
.stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.stat-val{font-size:24px;font-weight:700;color:var(--txt);font-family:var(--mono);letter-spacing:-1px}
.stat-lbl{font-size:11px;color:var(--txt2);margin-top:3px;font-weight:500}
.stat-chg{display:flex;align-items:center;gap:4px;font-size:11px;margin-top:8px}
.chg-up{color:var(--success)}.chg-dn{color:var(--danger)}.chg-neu{color:var(--txt3)}

/* ── CARDS ── */
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-title-left{display:flex;align-items:center;gap:8px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius-lg);border:0.5px solid var(--border);background:var(--surface)}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:600;color:var(--txt3);text-align:left;padding:10px 14px;border-bottom:0.5px solid var(--border);background:var(--surface2);letter-spacing:.04em;white-space:nowrap}
td{font-size:12.5px;padding:10px 14px;border-bottom:0.5px solid var(--border);color:var(--txt);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
.td-mono{font-family:var(--mono);font-size:11px;color:var(--txt2)}
.td-name{font-weight:500}
.td-sub{font-size:10px;color:var(--txt3);margin-top:1px}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:600;white-space:nowrap}
.badge::before{content:'';width:5px;height:5px;border-radius:50%}
.bg-green{background:#DCFCE7;color:#166534}.bg-green::before{background:#16A34A}
.bg-blue{background:#DBEAFE;color:#1E40AF}.bg-blue::before{background:#2563EB}
.bg-amber{background:#FEF3C7;color:#92400E}.bg-amber::before{background:#D97706}
.bg-red{background:#FEE2E2;color:#991B1B}.bg-red::before{background:#DC2626}
.bg-gray{background:#F3F4F6;color:#374151}.bg-gray::before{background:#9CA3AF}
.bg-teal{background:#CCFBF1;color:#134E4A}.bg-teal::before{background:#0D9488}
.bg-purple{background:#EDE9FE;color:#4C1D95}.bg-purple::before{background:#7C3AED}

/* ── MINI CHART ── */
.chart-bars{display:flex;align-items:flex-end;gap:5px;height:72px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-fill{width:100%;border-radius:4px 4px 0 0;min-height:4px;transition:height .3s}
.bar-lbl{font-size:9px;color:var(--txt3);font-family:var(--mono)}

/* ── TIMELINE ── */
.timeline{display:flex;flex-direction:column;gap:0}
.tl-item{display:flex;gap:12px;padding-bottom:14px;position:relative}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:13px;top:28px;bottom:0;width:0.5px;background:var(--border)}
.tl-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tl-dot.done{background:#DCFCE7}.tl-dot.done i{font-size:13px;color:#16A34A}
.tl-dot.active{background:#DBEAFE}.tl-dot.active i{font-size:13px;color:#2563EB}
.tl-dot.pending{background:var(--bg2)}.tl-dot.pending i{font-size:13px;color:var(--txt3)}
.tl-body{flex:1;padding-top:4px}
.tl-title{font-size:12px;font-weight:500;color:var(--txt)}
.tl-meta{font-size:10px;color:var(--txt3);margin-top:2px}

/* ── FORM ── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;font-weight:600;color:var(--txt2);margin-bottom:5px;letter-spacing:.03em}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg);border:0.5px solid var(--border2);border-radius:8px;padding:8px 11px;font-size:12.5px;color:var(--txt);font-family:var(--font);outline:none;transition:border-color .15s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--brand);background:var(--surface)}
.form-textarea{resize:none;line-height:1.6}

/* ── TOGGLES ── */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:0.5px solid var(--border)}
.toggle-row:last-child{border-bottom:none}
.toggle-info{font-size:12.5px;font-weight:500;color:var(--txt)}
.toggle-sub{font-size:11px;color:var(--txt3);margin-top:2px}
.toggle-switch{width:38px;height:21px;background:var(--border2);border-radius:11px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle-switch.on{background:var(--brand)}
.toggle-switch::after{content:'';position:absolute;width:15px;height:15px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-switch.on::after{left:20px}

/* ── PACKAGES ── */
.pkg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px}
.pkg-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:18px;position:relative;transition:box-shadow .2s}
.pkg-card:hover{box-shadow:var(--shadow-lg)}
.pkg-card.featured{border:1.5px solid var(--brand);background:linear-gradient(145deg,#FAFDF8,#F4F3EF)}
.pkg-pop{position:absolute;top:-1px;left:50%;transform:translateX(-50%);background:var(--brand);color:#fff;font-size:9.5px;font-weight:700;padding:2px 12px;border-radius:0 0 8px 8px;letter-spacing:.04em;font-family:var(--mono)}
.pkg-name{font-size:14px;font-weight:600;color:var(--txt);margin-bottom:4px}
.pkg-price{font-size:26px;font-weight:700;color:var(--brand);font-family:var(--mono);letter-spacing:-1px}
.pkg-per{font-size:12px;font-weight:400;color:var(--txt3)}
.pkg-features{margin-top:12px;display:flex;flex-direction:column;gap:7px}
.pkg-feat{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--txt2)}
.pkg-feat i{font-size:14px}
.pkg-feat.yes i{color:var(--success)}
.pkg-feat.no i{color:var(--border2)}

/* ── EMP CARDS ── */
.emp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.emp-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px;display:flex;gap:12px;align-items:center}
.emp-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;font-family:var(--mono)}
.emp-name{font-size:12.5px;font-weight:600;color:var(--txt)}
.emp-role{font-size:11px;color:var(--txt3);margin-top:1px}
.emp-jobs{margin-top:5px}

/* ── MSG PANEL ── */
.msg-panel{display:grid;grid-template-columns:240px 1fr;gap:0;border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--surface);min-height:360px}
.msg-list-panel{border-right:0.5px solid var(--border)}
.msg-search{padding:10px;border-bottom:0.5px solid var(--border)}
.msg-search input{width:100%;background:var(--bg);border:0.5px solid var(--border2);border-radius:7px;padding:7px 10px;font-size:12px;font-family:var(--font);outline:none;color:var(--txt)}
.msg-item{padding:12px 14px;border-bottom:0.5px solid var(--border);cursor:pointer;transition:background .12s;display:flex;gap:10px}
.msg-item:hover{background:var(--bg)}
.msg-item.active{background:var(--brand)}
.msg-item.active .msg-name,.msg-item.active .msg-prev,.msg-item.active .msg-time{color:#fff!important}
.msg-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.msg-name{font-size:12px;font-weight:600;color:var(--txt)}
.msg-prev{font-size:11px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msg-time{font-size:10px;color:var(--txt3);white-space:nowrap}
.msg-unread{width:8px;height:8px;background:var(--accent);border-radius:50%;flex-shrink:0;margin-top:2px}
.chat-panel{display:flex;flex-direction:column}
.chat-header{padding:14px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px}
.chat-messages{flex:1;padding:14px 16px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;min-height:240px;background:var(--surface2)}
.chat-bubble{max-width:70%;padding:9px 12px;border-radius:12px;font-size:12px;line-height:1.5}
.chat-in{background:var(--surface);border:0.5px solid var(--border);align-self:flex-start;border-radius:4px 12px 12px 12px}
.chat-out{background:var(--brand);color:#fff;align-self:flex-end;border-radius:12px 4px 12px 12px}
.chat-time{font-size:9px;opacity:.6;margin-top:3px}
.chat-input-row{padding:10px 14px;border-top:0.5px solid var(--border);display:flex;gap:8px}
.chat-input-row input{flex:1;background:var(--bg);border:0.5px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:12px;font-family:var(--font);outline:none}

/* ── PAYMENT ── */
.pay-methods{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.pay-method{flex:1;min-width:80px;background:var(--surface);border:0.5px solid var(--border2);border-radius:10px;padding:12px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:all .15s;font-size:11px;color:var(--txt2);font-weight:500}
.pay-method:hover,.pay-method.active{border-color:var(--brand);background:var(--bg);color:var(--brand)}
.pay-method i{font-size:22px}
.pay-method.active{border-width:1.5px}
.pay-summary{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:14px}
.pay-row{display:flex;justify-content:space-between;font-size:12.5px;color:var(--txt2);padding:5px 0}
.pay-divider{border:none;border-top:0.5px solid var(--border);margin:8px 0}
.pay-total{display:flex;justify-content:space-between;font-size:15px;font-weight:700;color:var(--txt);font-family:var(--mono)}
.qr-container{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:20px;text-align:center}
.qr-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:3px;width:108px;margin:14px auto 10px}
.qr-c{aspect-ratio:1;border-radius:1px;background:var(--brand)}
.qr-w{background:transparent;border:0.5px solid var(--border)}

/* ── BOOKING FLOW ── */
.step-nav{display:flex;gap:0;background:var(--bg);border:0.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px;width:fit-content}
.step{padding:7px 16px;font-size:12px;font-weight:500;color:var(--txt3);cursor:pointer;transition:all .15s}
.step.active{background:var(--brand);color:#fff}
.step.done{background:var(--bg2);color:var(--success)}
.time-slot-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.tslot{padding:6px 13px;border-radius:8px;font-size:12px;border:0.5px solid var(--border2);cursor:pointer;transition:all .15s;background:var(--surface);color:var(--txt2);font-weight:500}
.tslot:hover{border-color:var(--brand);color:var(--brand)}
.tslot.sel{border-color:var(--brand);background:var(--brand);color:#fff}
.tslot.unavail{opacity:.4;cursor:not-allowed}
.service-option{border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .15s;margin-bottom:8px;background:var(--surface)}
.service-option:hover{border-color:var(--brand)}
.service-option.sel{border:1.5px solid var(--brand);background:var(--bg)}
.service-option.sel .so-radio{background:var(--brand);border-color:var(--brand)}
.service-option.sel .so-radio::after{display:block}
.so-radio{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;position:relative}
.so-radio::after{content:'';display:none;width:8px;height:8px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px}

/* ── SETTINGS ── */
.settings-layout{display:grid;grid-template-columns:180px 1fr;gap:14px}
.settings-sidebar{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:8px;align-self:start}
.ss-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;font-size:12.5px;color:var(--txt2);cursor:pointer;transition:all .12s;font-weight:500}
.ss-item:hover{background:var(--bg);color:var(--txt)}
.ss-item.active{background:var(--brand);color:#fff}
.ss-item i{font-size:15px}

/* ── CUSTOMER PORTAL ── */
.hero{background:var(--brand);border-radius:var(--radius-xl);padding:30px 32px;margin-bottom:20px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;right:-40px;top:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.04)}
.hero::after{content:'';position:absolute;right:60px;bottom:-60px;width:140px;height:140px;border-radius:50%;background:rgba(245,166,35,.08)}
.hero-tag{display:inline-block;background:var(--accent);color:var(--brand);font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:12px;font-family:var(--mono)}
.hero-title{font-size:26px;font-weight:600;color:#fff;margin-bottom:8px;letter-spacing:-.5px;line-height:1.2}
.hero-sub{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:18px;max-width:400px}
.hero-actions{display:flex;gap:10px;flex-wrap:wrap}
.hero-stats{display:flex;gap:24px;margin-top:20px;padding-top:20px;border-top:0.5px solid rgba(255,255,255,.12)}
.hs-item{text-align:center}
.hs-val{font-size:20px;font-weight:700;color:#fff;font-family:var(--mono)}
.hs-lbl{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px}

.service-grid-cust{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.svc-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all .2s;text-align:center}
.svc-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);border-color:var(--brand)}
.svc-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.svc-icon i{font-size:24px}
.svc-name{font-size:13px;font-weight:600;color:var(--txt)}
.svc-price{font-size:11px;color:var(--txt3);margin-top:3px}
.svc-cta{margin-top:8px;font-size:11px;color:var(--brand);font-weight:600;opacity:0;transition:opacity .15s}
.svc-card:hover .svc-cta{opacity:1}

/* ── RESPONSIVE ── */
@media(max-width:700px){.stat-grid{grid-template-columns:1fr 1fr}.pkg-grid{grid-template-columns:1fr}.emp-grid{grid-template-columns:1fr 1fr}.two-col,.form-row{grid-template-columns:1fr}.settings-layout{grid-template-columns:1fr}.service-grid-cust{grid-template-columns:1fr 1fr}}

const PORTALS = {
  admin: {
    nav: [
      {id:'dash', label:'Dashboard', icon:'ti-layout-dashboard'},
      {id:'bookings', label:'Bookings', icon:'ti-calendar-check', badge:12},
      {id:'packages', label:'Services & Packages', icon:'ti-package'},
      {id:'employees', label:'Team', icon:'ti-users'},
      {id:'messages', label:'Messages', icon:'ti-message-circle', badge:5},
      {id:'billing', label:'Billing', icon:'ti-receipt'},
      {id:'settings', label:'Settings', icon:'ti-settings'},
    ],
    sections: [
      {label:'OVERVIEW', items:['dash','bookings']},
      {label:'OPERATIONS', items:['packages','employees']},
      {label:'BUSINESS', items:['messages','billing','settings']},
    ]
  },
  customer: {
    nav: [
      {id:'cust-home', label:'Home', icon:'ti-home'},
      {id:'cust-book', label:'Book a Service', icon:'ti-calendar-plus'},
      {id:'cust-track', label:'My Bookings', icon:'ti-list-check'},
      {id:'cust-billing', label:'Payments', icon:'ti-credit-card'},
      {id:'cust-profile', label:'My Profile', icon:'ti-user'},
    ],
    sections: [
      {label:'CUSTOMER', items:['cust-home','cust-book','cust-track','cust-billing','cust-profile']},
    ]
  }
};

let currentPortal = 'admin';
let currentPage = 'dash';

function switchPortal(p) {
  currentPortal = p;
  document.getElementById('pp-admin').classList.toggle('active', p==='admin');
  document.getElementById('pp-customer').classList.toggle('active', p==='customer');
  const first = PORTALS[p].nav[0].id;
  buildSidebar();
  navigateTo(first);
}

function buildSidebar() {
  const p = PORTALS[currentPortal];
  let html = '<div class="sidebar-inner">';
  p.sections.forEach(sec => {
    html += `<div class="s-section"><span class="s-label">${sec.label}</span>`;
    sec.items.forEach(id => {
      const item = p.nav.find(n=>n.id===id);
      if(!item) return;
      const badge = item.badge ? `<span class="s-badge">${item.badge}</span>` : '';
      html += `<button class="s-item${currentPage===id?' active':''}" onclick="navigateTo('${id}')"><i class="ti ${item.icon}"></i>${item.label}${badge}</button>`;
    });
    html += '</div>';
  });
  html += '</div><div class="sidebar-footer"><div class="biz-card"><div class="biz-name">AutoCare Pro</div><div class="biz-plan">Chandigarh Branch</div><div style="font-size:10px;color:var(--txt3);margin-top:2px">24 employees · Pro Plan</div></div></div>';
  document.getElementById('sidebarEl').innerHTML = html;
}

function navigateTo(id) {
  currentPage = id;
  buildSidebar();
  renderPage(id);
}

function renderPage(id) {
  const el = document.getElementById('mainEl');
  const fn = PAGES[id];
  el.innerHTML = fn ? fn() : `<div class="page active" style="padding:40px;text-align:center;color:var(--txt3)"><i class="ti ti-construction" style="font-size:48px;display:block;margin-bottom:12px"></i>Page coming soon</div>`;
}
