AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Resources:

  AutoCareApi:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs20.x
      Handler: app.handler
      CodeUri: .
      MemorySize: 1024
      Timeout: 30

      Events:
        Api:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY